nelmio_api_doc:
    documentation:
        info:
            title: Symfony REST API
            description: API REST con Symfony 7, JWT Auth, paginación optimizada
            version: 1.0.0
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - Bearer: []
    areas:
        path_patterns:
            - ^/api(?!/doc$)
